# Workflow Skills Workflow Spec Documentation Workflow

## Action

Follow the spec-documentation-workflow workflow:
1. Create or update issue and specification markdown/json files under specs/<issue-id>/
2. Add or update planning, review, testing, and result artifacts for the issue
3. Commit all related documentation files

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: specs/<issue-id>/step-00-<issue-id>.issue.json, specs/<issue-id>/step-00-<issue-id>.spec.md, specs/<issue-id>/step-01-<issue-id>.plan.md


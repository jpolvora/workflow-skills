name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# One deploy at a time. Do not cancel in-progress: a mid-flight Pages deploy
# must finish; the next push queues behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Rebuild catalog only — do NOT pass --bump here.
      # package.json is the canonical version; footer must match install/--version/--check.
      - name: Regenerate catalog from skills
        run: node bin/build-site.js

      - name: Verify site footer matches package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          FOOTER_VER=$(grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' docs/index.html | tail -1 | tr -d 'v')
          echo "package.json=$PKG_VER footer=$FOOTER_VER"
          if [ "$PKG_VER" != "$FOOTER_VER" ]; then
            echo "::error::Site footer version ($FOOTER_VER) != package.json ($PKG_VER)"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

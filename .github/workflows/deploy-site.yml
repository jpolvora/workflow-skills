name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Rebuild catalog only — do NOT pass --bump here.
      # package.json is the canonical version; footer must match install/--version/--check.
      - name: Regenerate catalog from skills
        run: node bin/build-site.js

      - name: Verify site footer matches package.json
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          FOOTER_VER=$(grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' docs/index.html | tail -1 | tr -d 'v')
          echo "package.json=$PKG_VER footer=$FOOTER_VER"
          if [ "$PKG_VER" != "$FOOTER_VER" ]; then
            echo "::error::Site footer version ($FOOTER_VER) != package.json ($PKG_VER)"
            exit 1
          fi

      - name: Commit catalog changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to publish"
          else
            git commit -m "chore: auto-regenerate site catalog [skip ci]"
            git push
          fi

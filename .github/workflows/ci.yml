name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify skill integrity digests
        run: npm run verify-integrity

      - name: Verify site generator
        run: node bin/build-site.js

      - name: Run workflow skills test suite
        run: npm run tests -- --local

name: Agentic Code Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v6
        with: { node-version: 22 }

      - name: Run code reviewer
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/jpolvora/agentic-code-reviewers/release/run.sh | bash -s -- \
            --engine opencode \
            --model opencode-go/deepseek-v4-flash \
            --gh \
            --stack Custom \
            --include-patterns "**/*.md,**/*.yml,**/*.yaml,**/*.json,**/*.sh,**/*.ps1,**/*.psm1,**/*.psd1,**/*.cmd,**/*.js,**/*.ts,**/*.css,**/*.html" \
            --source-branch "refs/heads/${{ github.head_ref }}" \
            --target-branch "refs/heads/${{ github.event.pull_request.base.ref }}"
        continue-on-error: true

      - name: Check for unresolved threads
        id: check-threads
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ACTIVE=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '[.comments[] | select(.isResolved == false and .author.login != "github-actions[bot]" and .author.login != "github-actions")] | length' 2>/dev/null || echo 0)
          echo "active_threads=$ACTIVE" >> $GITHUB_OUTPUT
          echo "Unresolved threads: $ACTIVE"

      - name: Block merge on unresolved threads
        if: ${{ steps.check-threads.outputs.active_threads != '0' }}
        run: |
          echo "::error::PR has ${{ steps.check-threads.outputs.active_threads }} unresolved review thread(s). Resolve them before merging."
          exit 1
